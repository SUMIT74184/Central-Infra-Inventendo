server:
  port: 8083

spring:
  application:
    name: warehouse-service

  datasource:
    # Use 'postgres' (the service name) and port 5432 (internal Docker port)
    url: jdbc:postgresql://${DATABASE_HOST:postgres}:5432/warehousedb
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  # Kafka Configuration - Uses the service name 'kafka'
  kafka:
    bootstrap-servers: ${KAFKA_HOST:kafka}:9092
    consumer:
      group-id: warehouse-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  # Redis Configuration - Uses the service name 'redis'
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always