server:
  port: 8082
  address: 0.0.0.0

spring:
  cloud:
    openfeign:
      circuitbreaker:
        enabled: true
  application:
    name: order-service

  datasource:
    url: jdbc:mysql://mysql:3306/order_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: kafka:29092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cache:
    type: redis
    redis:
      time-to-live: 600000
  data:
    redis:
      port: 6379
      host: redis
      timeout: 60000

inventory:
  service:
    url: http://localhost:8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  prometheus:
    metrics:
      export:
        enabled: true

logging:
  level:
    com.inventory.order: DEBUG
    org.springframework.web: INFO