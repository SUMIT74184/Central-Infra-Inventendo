server:
  port: 8080

spring:
  cloud:
    gateway:
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          '[/**]':
            allowedOrigins: 
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods: "*"
            allowedHeaders: "*"
            allowCredentials: true
            exposedHeaders:
              - "Authorization"
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      routes:
        - id: auth
          uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
          predicates:
            - Path=/api/auth/**

        - id: order
          uri: ${ORDER_SERVICE_URL:http://order-service:8082}
          predicates:
            - Path=/api/orders/**

        - id: inventory
          uri: ${INVENTORY_SERVICE_URL:http://inventory-service:8081}
          predicates:
            - Path=/api/v1/inventory/**

        - id: tenant
          uri: ${TENANT_SERVICE_URL:http://tenant-service:8084}
          predicates:
            - Path=/api/v1/tenants/**

        - id: warehouse
          uri: ${WAREHOUSE_SERVICE_URL:http://warehouse-service:8080}
          predicates:
            - Path=/api/v1/warehouses/**

        - id: movement
          uri: ${MOVEMENT_SERVICE_URL:http://movement-service:8082}
          predicates:
            - Path=/api/v1/movements/**

        - id: alerts
          uri: ${ALERT_SERVICE_URL:http://alert-service:8087}
          predicates:
            - Path=/api/v1/alerts/**