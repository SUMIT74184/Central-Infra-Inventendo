version: '3.8'
 
# Global logging configuration to prevent disk growth
x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"


# =============================================================================
#  CENTRAL INFRA — Single docker-compose for all microservices
#
#  Shared infrastructure (run ONCE, not 8 times):
#    • PostgreSQL  – one instance, one DB per service  (port 5432)
#    • MySQL       – order-service only                (port 3306)
#    • Redis       – one shared instance               (port 6379)
#    • Zookeeper   – one instance                      (internal)
#    • Kafka       – one broker                        (port 9092 / 29092)
#    • Kafka UI    – browser at http://localhost:8090
#
#  Quick-start:
#    docker-compose up -d                  # start everything
#    docker-compose up -d postgres redis kafka   # infra only, run services locally
#    docker-compose logs -f auth-service   # tail a service
#    docker-compose down -v                # stop & wipe volumes
#
#  Required .env file at project root:
#    POSTGRES_USER=postgres
#    POSTGRES_PASSWORD=postgres
#    MYSQL_ROOT_PASSWORD=root
#    JWT_SECRET=<long-random-secret>
#    REDIS_PASSWORD=          # leave blank for no password (dev default)
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  #  INFRASTRUCTURE
  # ---------------------------------------------------------------------------

  postgres:
    image: postgres:16-alpine
    container_name: shared-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init.sql:ro
    logging: *default-logging
    networks:
      - inventory-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # order-service uses MySQL — kept as a separate container
  mysql:
    image: mysql:8.0
    container_name: shared-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: order_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    logging: *default-logging
    networks:
      - inventory-network
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-proot" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: shared-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    logging: *default-logging
    networks:
      - inventory-network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: shared-zookeeper
    environment:
      KAFKA_HEAP_OPTS: "-Xmx256m -Xms128m"
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "*"
    logging: *default-logging
    networks:
      - inventory-network
    healthcheck:
      test: [ "CMD-SHELL", "cub zk-ready localhost:2181 5" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: shared-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092" # host (IntelliJ / Postman) uses this
      # 29092 is the internal Docker-network listener (not exposed outside)
    environment:
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT_INTERNAL:PLAINTEXT,PLAINTEXT_EXTERNAL:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT_INTERNAL://0.0.0.0:29092,PLAINTEXT_EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT_INTERNAL://kafka:29092,PLAINTEXT_EXTERNAL://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    logging: *default-logging
    networks:
      - inventory-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: shared-kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    logging: *default-logging
    networks:
      - inventory-network

  # ---------------------------------------------------------------------------
  #  MICROSERVICES
  # ---------------------------------------------------------------------------

  auth-service:
    build:
      context: ./services/Auth
      dockerfile: Dockerfile
    container_name: auth-service
    ports:
      - "8081:8081"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/auth_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1teS1zdXBlci1zZWNyZXQta2V5LTEyMzQ1Njc4OQ==}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  inventory-service:
    build:
      context: ./services/Microservice1
      dockerfile: Dockerfile
    container_name: inventory-service
    ports:
      - "8080:8081"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/inventory_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

  movement-service:
    build:
      context: ./services/MovementMcs
      dockerfile: Dockerfile
    container_name: movement-service
    ports:
      - "8082:8082"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/movement_db
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: movement_db
      SPRING_DATA_REDIS_HOST: redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

  order-service:
    build:
      context: ./services/OrderSvc
      dockerfile: Dockerfile
    container_name: order-service
    ports:
      - "8083:8082"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/order_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_CLOUD_OPENFEIGN_CIRCUITBREAKER_ENABLED: "true"
      # For calling other services inside Docker network use their container names
      INVENTORY_SERVICE_URL: http://inventory-service:8081
      TENANT_SERVICE_URL: http://tenant-service:8084
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

  tenant-service:
    build:
      context: ./services/TenantMvc
      dockerfile: Dockerfile
    container_name: tenant-service
    ports:
      - "8084:8084"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tenant_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

  warehouse-service:
    build:
      context: ./services/WareHousemcs
      dockerfile: Dockerfile
    container_name: warehouse-service
    ports:
      - "8085:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/warehousedb
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SERVER_PORT: 8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

  billing-service:
    build:
      context: ./services/Billing-Payment
      dockerfile: Dockerfile
    container_name: billing-service
    ports:
      - "8086:8086"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/billing_db
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-postgres}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-placeholder}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-sk_test_placeholder}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-whsec_placeholder}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

  alert-service:
    build:
      context: ./services/AlertSvc
      dockerfile: Dockerfile
    container_name: alert-service
    ports:
      - "8087:8087"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/alert_db
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    ports:
      - "8000:8080"
    environment:
      JAVA_TOOL_OPTIONS: "-Xmx256m -Xms128m"
      SPRING_PROFILES_ACTIVE: docker
      AUTH_SERVICE_URL: http://auth-service:8081
      INVENTORY_SERVICE_URL: http://inventory-service:8081
      ORDER_SERVICE_URL: http://order-service:8082
      TENANT_SERVICE_URL: http://tenant-service:8084
      WAREHOUSE_SERVICE_URL: http://warehouse-service:8080
      BILLING_SERVICE_URL: http://billing-service:8086
      MOVEMENT_SERVICE_URL: http://movement-service:8082
      ALERT_SERVICE_URL: http://alert-service:8087
      JWT_SECRET: ${JWT_SECRET:-bXktc3VwZXItc2VjcmV0LWtleS1teS1zdXBlci1zZWNyZXQta2V5LTEyMzQ1Njc4OQ==}
    depends_on:
      auth-service:
        condition: service_healthy
    logging: *default-logging
    networks:
      - inventory-network
    restart: on-failure

# ---------------------------------------------------------------------------
#  VOLUMES & NETWORKS
# ---------------------------------------------------------------------------

volumes:
  postgres_data:
  mysql_data:
  redis_data:


networks:
  inventory-network:
    driver: bridge
